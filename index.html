<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#f8f9fb" />
    <title>IST Dispatch</title>
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { height: -webkit-fill-available; }
      body { background: #f8f9fb; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; color: #111827; min-height: 100vh; min-height: -webkit-fill-available; min-height: 100dvh; }
      #root { height: 100%; display: flex; flex-direction: column; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f1f1f1; }
      ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
      ::selection { background: #dbeafe; }
      @keyframes badgePulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
        50% { transform: scale(1.15); box-shadow: 0 0 0 4px rgba(239,68,68,0); }
      }
      @keyframes borderPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); border-color: #ef4444; }
        50% { box-shadow: 0 0 0 4px rgba(239,68,68,0); border-color: #fca5a5; }
      }
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }
      /* Mobile: bottom sheet modals */
      @media (max-width: 639px) {
        .modal-backdrop {
          align-items: flex-end !important;
          padding: 0 !important;
        }
        .modal-container {
          border-radius: 20px 20px 0 0 !important;
          max-width: 100% !important;
          animation: slideUp 0.28s cubic-bezier(0.32, 0.72, 0, 1);
        }
      }
      /* Desktop: centered modals */
      @media (min-width: 640px) {
        .modal-backdrop {
          align-items: center !important;
          padding: 20px !important;
        }
        .modal-container {
          border-radius: 16px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
